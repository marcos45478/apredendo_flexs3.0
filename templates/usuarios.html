<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='usuarios.css') }}" />
    
</head>

<body>
    <div class="container">
        <h1>Usuários Cadastrados</h1>
        <table>
           <form method="get" action="/usuarios">
            <label for="busca">Busca pelo CPF</label>
            <input type="text" inputmode="numeric" pattern="[0-9]{3}\.?[0-9]{3}\.?[0-9]{3}\-?[0-9]{2}" title="Digite um CPF válido" maxlength="14" placeholder="000.000.000-00" id="cpf" name="cpf"  value="{{ request.args.get('cpf','') }}">
            <button class="btn">Busca</button>
            
        <select name="ordem" id="ordem">

            <option value="">Ordenar por idade</option>
            <option value="crescente">Menor idade</option>
            <option value="decrescente">Maior idade</option>

        </select>

<button type="submit" class="btn">Ordenar</button>

        </form>
            <thead>
                
                <tr>
                    
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>E-mail</th>
                    <th>Idade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for usuario in usuarios %}
                <tr>
                    <td>{{ usuario.nome }}</td>
                    <td>{{ usuario.cpf }}</td>
                    <td>{{ usuario.email }}</td>
                    <td>{{ usuario.idade }}</td>
                    
                    <td>
                        <form action="{{ url_for('deletar_usuario') }}" 
                        method="POST"
                        onsubmit="return confirm('Tem certeza que deseja deletar este usuário?')">
                        <input type="hidden" name="cpf" value="{{ usuario.cpf }}">
                        <button type="submit">Excluir</button>
                        <button type="reset">Edita</button>
    </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
<script>
    document.getElementById("cpf").addEventListener("input", function (e) {
    let value = e.target.value.replace(/\D/g, "");

    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

    e.target.value = value;
});


</script>
</body>

</html>
