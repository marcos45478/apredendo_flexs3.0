<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro-usuarios.css') }}">
</head>

<body>

    <form method="POST" action="{{ url_for('editar_perfil') }}">

        {% with mensagens = get_flashed_messages(with_categories=true)%}
            {% if mensagens %}
                {% for categoria, mensagem in mensagens %}
                <div class="flash {{categoria}}">
                    {{mensagem}}
                </div>
                {%endfor%}
            {%endif%}
        {%endwith%}

        <h2>Editar Meu Perfil</h2>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ usuario.nome }}" required>

        <label for="cpf">CPF (não pode ser alterado):</label>
        <input type="text" id="cpf" name="cpf" value="{{ usuario.cpf }}" disabled readonly>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" value="{{ usuario.idade }}" required min="18">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ usuario.email }}" required>

        <hr>

        <h3>Alterar Senha (deixe em branco para não alterar)</h3>

        <label for="senha_atual">Senha Atual:</label>
        <input type="password" id="senha_atual" name="senha_atual" autocomplete="current-password">

        <label for="senha_nova">Nova Senha:</label>
        <input type="password" id="senha_nova" name="senha_nova" autocomplete="new-password">

        <div class="button-group">
            <button type="submit" class="btn-save">Salvar Alterações</button>
            <a href="{{ url_for('buscar_usuarios') }}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>

    <script>
        // Habilita o campo de senha atual apenas quando senha nova é preenchida
        const senhaNovaInput = document.getElementById('senha_nova');
        const senhaAtualInput = document.getElementById('senha_atual');

        senhaNovaInput.addEventListener('input', function() {
            if (this.value.trim() !== '') {
                senhaAtualInput.required = true;
            } else {
                senhaAtualInput.required = false;
            }
        });
    </script>
</body>

</html>
