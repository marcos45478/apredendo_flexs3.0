<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <title>Login</title>
</head>
<body>
  <form action="/login" method="post">
    <div class="container">
        <h1>Fazer Login</h1>

         {% with mensagens = get_flashed_messages(with_categories=true) %}
      {% for categoria, mensagem in mensagens %}
        <p class="{{ categoria }}">{{ mensagem }}</p>
      {% endfor %}
    {% endwith %}

        <label for="cpf">CPF</label>
        <input type="text" name="cpf" id="cpf" required inputmode="numeric" pattern="[0-9]{3}\.?[0-9]{3}\.?[0-9]{3}\-?[0-9]{2}" title="Digite um CPF válido" maxlength="14" placeholder="000.000.000-00" >

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" required>

        <button type="submit">Login</button>
        
        <div class="links">
            <p>Não tem conta? <a href="{{ url_for('tela_cadastro') }}">Cadastre-se aqui</a></p>
            <p><a href="{{ url_for('home') }}">Voltar para home</a></p>
        </div>
    </div>

    <script>
       document.getElementById("cpf").addEventListener("input", function (e) {
    let value = e.target.value.replace(/\D/g, "");

    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

    e.target.value = value;
    });
    </script>
</form>
</body>
</html>
