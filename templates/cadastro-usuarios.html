<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro-usuarios.css') }}">
</head>

<body>

    <form action="{{ url_for('cadastrar_usuario') }}" method="POST">

        {% with mensagens = get_flashed_messages(with_categories=true)%}
            {% if mensagens %}
                {% for categoria, mensagem in mensagens %}
                <div class="flash {{categoria}}">
                    {{mensagem}}
                </div>
                {%endfor%}
            {%endif%}
        {%endwith%}

        <h2>Cadastro de Usuário</h2>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ request.form.nome}}">

        <label for="cpf">CPF:</label>
        <input type="text" inputmode="numeric" pattern="[0-9]{3}\.?[0-9]{3}\.?[0-9]{3}\-?[0-9]{2}" title="Digite um CPF válido" maxlength="14" placeholder="000.000.000-00" id="cpf" name="cpf" value="{{ request.form.cpf}}">

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" value="{{ request.form.idade}}">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ request.form.email}}">

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" value="{{ request.form.senha}}">
        <span class=""></span>
        <button type="submit">Cadastrar</button>
<select name="ordem" id="ordem">

            <option value="">Seu nivel</option>
            <option value="crescente">comun</option>
            <option value="decrescente">adimin</option>

        </select>

    </form>
<script>
    // const senhaInput = document.getElementById('senha');
    // const toggle = document.getElementById('toggleSenha');
    // const eyelcon = toggle.querySelector('svg')

    // toggle.addEventListener('click', function () {
    //     const visible = senhaInput.type == 'text'
    //     senhaInput.type = visible ? 'password' : 'text';
    //     eyelcon.setAttribute('stroke', visible ? '#374151' : '#2563eb');
    // });

    document.getElementById("cpf").addEventListener("input", function (e) {
    let value = e.target.value.replace(/\D/g, "");

    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d)/, "$1.$2");
    value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

    e.target.value = value;
});
</script>
</body>
</html>
